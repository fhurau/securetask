name: Security CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Run Maven tests
        working-directory: backend
        run: mvn --batch-mode --no-transfer-progress test

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build

  gitleaks:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Check out full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Scan Git history for secrets
        run: >-
          docker run --rm
          -v "$PWD:/repo"
          ghcr.io/gitleaks/gitleaks:v8.28.0
          git --no-banner --redact --verbose /repo

  trivy:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Scan dependencies
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          timeout: 10m

  deploy:
    name: Kubernetes deploy demo (kind)
    # Demonstrates deployment readiness only: builds the app images, spins up
    # a disposable local kind (Kubernetes-in-Docker) cluster on the runner,
    # applies deploy/k8s/, and smoke-tests it. No cloud account, no
    # container registry, no credentials of any kind - the cluster and both
    # images live and die entirely within this job. Not a real deployment.
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build backend image
        run: docker build -t securetask-backend:ci ./backend

      - name: Build frontend image
        # Same build args docker-compose.yml passes today. NEXT_PUBLIC_* are
        # inlined into the JS bundle at this step - see
        # deploy/k8s/frontend/configmap.yaml for why they can't be changed
        # afterward via the ConfigMap.
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_KEYCLOAK_URL=http://localhost:8081 \
            --build-arg NEXT_PUBLIC_KEYCLOAK_REALM=securetask \
            --build-arg NEXT_PUBLIC_KEYCLOAK_CLIENT_ID=securetask-frontend \
            --build-arg NEXT_PUBLIC_API_PROXY_PATH=/api/backend \
            -t securetask-frontend:ci ./frontend

      - name: Create kind cluster
        uses: helm/kind-action@v1.14.0
        with:
          cluster_name: securetask

      - name: Load images into kind
        # No registry involved: the images built above exist only in the
        # runner's local Docker daemon, and kind load injects them straight
        # into the cluster's node containerd cache.
        run: |
          kind load docker-image securetask-backend:ci --name securetask
          kind load docker-image securetask-frontend:ci --name securetask

      - name: Create namespace
        run: kubectl apply -f deploy/k8s/namespace.yaml

      - name: Generate Keycloak realm import ConfigMap
        # Generated from the single source of truth (infra/keycloak/realms)
        # rather than committed as a second copy under deploy/k8s - see the
        # comment at the top of deploy/k8s/keycloak/deployment.yaml.
        run: |
          kubectl create configmap keycloak-realm-import -n securetask \
            --from-file=infra/keycloak/realms/securetask-realm.json \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply Kubernetes manifests
        run: kubectl apply -R -f deploy/k8s/

      - name: Wait for datastore and broker pods
        run: |
          kubectl -n securetask rollout status deployment/postgres --timeout=180s
          kubectl -n securetask rollout status deployment/redis --timeout=180s
          kubectl -n securetask rollout status deployment/kafka --timeout=180s

      - name: Wait for Keycloak
        run: kubectl -n securetask rollout status deployment/keycloak --timeout=240s

      - name: Wait for backend and frontend
        run: |
          kubectl -n securetask rollout status deployment/backend --timeout=180s
          kubectl -n securetask rollout status deployment/frontend --timeout=120s

      - name: Smoke test backend health via port-forward
        # kind has no ingress controller installed by default (wiring up
        # ingress-nginx needs cluster-level config fixed at cluster-creation
        # time); port-forward proves the Service routes to a real, ready Pod
        # just as convincingly with far less CI complexity. deploy/k8s/ingress.yaml
        # is still applied above for anyone testing locally with ingress-nginx.
        run: |
          kubectl -n securetask port-forward svc/backend 8080:8080 &
          PF_PID=$!
          trap 'kill $PF_PID' EXIT
          for _ in $(seq 1 15); do
            if curl --fail --silent http://localhost:8080/api/v1/health; then
              echo "backend healthy"
              exit 0
            fi
            sleep 2
          done
          echo "backend health check failed"
          kubectl -n securetask logs deployment/backend --tail=200
          exit 1

      - name: Smoke test frontend via port-forward
        run: |
          kubectl -n securetask port-forward svc/frontend 3000:3000 &
          PF_PID=$!
          trap 'kill $PF_PID' EXIT
          for _ in $(seq 1 15); do
            if curl --fail --silent --output /dev/null http://localhost:3000/; then
              echo "frontend responding"
              exit 0
            fi
            sleep 2
          done
          echo "frontend check failed"
          kubectl -n securetask logs deployment/frontend --tail=200
          exit 1

      - name: Dump pod status on failure
        if: failure()
        run: |
          kubectl -n securetask get pods -o wide
          kubectl -n securetask describe pods
