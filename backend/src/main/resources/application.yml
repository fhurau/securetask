spring:
  application:
    name: securetask-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/keycloak?currentSchema=securetask}
    username: ${DATABASE_USERNAME:securetask}
    password: ${DATABASE_PASSWORD:change-me-for-local-development}
  flyway:
    default-schema: securetask
    schemas: securetask
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: securetask
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SECURITY_JWT_ISSUER_URI:http://localhost:8081/realms/securetask}
          jwk-set-uri: ${SECURITY_JWT_JWK_SET_URI:http://localhost:8081/realms/securetask/protocol/openid-connect/certs}

management:
  endpoints:
    web:
      exposure:
        include: health
