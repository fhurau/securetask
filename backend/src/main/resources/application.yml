spring:
  application:
    name: securetask-backend
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/keycloak?currentSchema=securetask}
    username: ${DATABASE_USERNAME:securetask}
    password: ${DATABASE_PASSWORD:change-me-for-local-development}
  flyway:
    default-schema: securetask
    schemas: securetask
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: securetask
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SECURITY_JWT_ISSUER_URI:http://localhost:8081/realms/securetask}
          jwk-set-uri: ${SECURITY_JWT_JWK_SET_URI:http://localhost:8081/realms/securetask/protocol/openid-connect/certs}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: audit-log-writer
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.securetask.backend.audit
        spring.json.value.default.type: com.securetask.backend.audit.AuditEvent
        spring.json.use.type.headers: false

management:
  endpoints:
    web:
      exposure:
        include: health

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

securetask:
  documents:
    storage-path: ${DOCUMENT_STORAGE_PATH:./data/uploads}
    max-size-bytes: 5242880
