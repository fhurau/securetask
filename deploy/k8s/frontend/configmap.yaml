# NEXT_PUBLIC_* values are Next.js *build-time* env vars - Next.js inlines
# them into the built JS bundle during `npm run build` and cannot read them
# from a container's runtime environment/ConfigMap afterward. They're listed
# here for documentation of what the CI-built image was built with (see the
# `docker build --build-arg` invocation in .github/workflows/security-ci.yml);
# changing them here has no effect unless the image is rebuilt with matching
# --build-arg values. BACKEND_API_BASE_URL is the one genuinely
# runtime-configurable value - it's read server-side by the Next.js BFF
# proxy route on each request, not inlined at build time.
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: securetask
data:
  NEXT_PUBLIC_KEYCLOAK_URL: http://localhost:8081
  NEXT_PUBLIC_KEYCLOAK_REALM: securetask
  NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: securetask-frontend
  NEXT_PUBLIC_API_PROXY_PATH: /api/backend
  BACKEND_API_BASE_URL: http://backend:8080/api/v1
