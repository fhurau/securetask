apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: securetask
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          # Built and `kind load docker-image`d by CI (or locally, see
          # README.md "Kubernetes (Demonstration)") - never pulled from a
          # registry, so this must stay IfNotPresent.
          image: securetask-frontend:ci
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: frontend-config
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15
