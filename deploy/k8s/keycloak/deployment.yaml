# Note: the "keycloak-realm-import" ConfigMap referenced below is not committed
# here. It is generated at apply time from the single source of truth,
# infra/keycloak/realms/securetask-realm.json, so the realm definition never
# has to be kept in sync in two places:
#
#   kubectl create configmap keycloak-realm-import -n securetask \
#     --from-file=infra/keycloak/realms/securetask-realm.json \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# Run that before (or after, order doesn't matter for Deployments) applying
# this manifest. See README.md "Kubernetes (Demonstration)" for the full
# sequence.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: securetask
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.1
          args: ["start-dev", "--import-realm"]
          ports:
            - containerPort: 8080
            - containerPort: 9000
          envFrom:
            - configMapRef:
                name: keycloak-config
          volumeMounts:
            - name: realm-import
              mountPath: /opt/keycloak/data/import
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 9000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/live
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: realm-import
          configMap:
            name: keycloak-realm-import
