# Same KRaft (no Zookeeper) setup as docker-compose.yml's kafka service,
# minus the PLAINTEXT_HOST listener: compose needs that second listener so
# host-machine tools can reach Kafka at localhost, but nothing outside the
# cluster needs to reach Kafka directly here (only the backend Pod, over the
# in-cluster PLAINTEXT listener at kafka:9092).
apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-config
  namespace: securetask
data:
  KAFKA_NODE_ID: "1"
  KAFKA_PROCESS_ROLES: broker,controller
  KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
  KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
  KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
  KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
  KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
  KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
  KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
